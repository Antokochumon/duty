<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#3b82f6">
  <meta name="description" content="Professional Duty Calendar App - Advanced scheduling with smart reminders">
  <title>Duty Calendar 2025</title>
  <!-- OneSignal SDK for push notifications -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    // Fixed OneSignal initialization for v16 SDK
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    
    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: "74ec48f7-2aba-4801-83dd-e3b373c160d1",
        safari_web_id: "web.onesignal.auto.74ec48f7-2aba-4801-83dd-e3b373c160d1",
        allowLocalhostAsSecureOrigin: true,
        notifyButton: {
          enable: true,
          displayPredicate: () => true,
        },
      });
      
      console.log("✅ OneSignal initialized");
      
      // Get user ID after initialization
      setTimeout(async () => {
        try {
          // FIXED: Use correct OneSignal API for v16
          const userId = await OneSignal.User.getOnesignalId();
          console.log("OneSignal User ID:", userId);
          
          if (userId) {
            showNotification("✅ Notifications Ready", "Push notifications are properly configured!", "success");
            await registerUserWithBackend(userId);
          }
        } catch(e) {
          console.log("Error getting user ID:", e);
        }
      }, 3000);
      
      // Auto-prompt for permission
      setTimeout(async () => {
        const permission = await OneSignal.Notifications.permission;
        if (permission === "default") {
          const result = await OneSignal.Notifications.requestPermission();
          if (result) {
            console.log("Notification permission granted");
          }
        }
      }, 2000);
    });
    
    // Register user with Google Apps Script backend
    async function registerUserWithBackend(onesignalId) {
      try {
        const response = await fetch('https://script.google.com/macros/s/AKfycbxvVK3kGDzsM0MIRl22Uot7H4Sksk3mP6ja4O7pRprb2fE58a7XZBxLMKxqGYa_xnHu/exec', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: `action=register&onesignal_id=${onesignalId}`
        });
        const result = await response.json();
        console.log("User registered with backend:", result);
      } catch(e) { console.log("Backend registration error:", e); }
    }
    
    // Send duty notification via Google Apps Script (works when browser closed)
    async function sendBackendNotification(title, message, dutyDate, startTime, dutyType) {
      try {
        let onesignalId = null;
        if (window.OneSignal) {
          try {
            onesignalId = await window.OneSignal.User.getOnesignalId();
          } catch(e) { console.log("Error getting ID:", e); }
        }
        
        const payload = new URLSearchParams({
          action: 'send_notification',
          title: title,
          message: message,
          duty_date: dutyDate || '',
          duty_time: startTime || '',
          duty_type: dutyType || '',
          onesignal_id: onesignalId || ''
        });
        
        await fetch('https://script.google.com/macros/s/AKfycbxvVK3kGDzsM0MIRl22Uot7H4Sksk3mP6ja4O7pRprb2fE58a7XZBxLMKxqGYa_xnHu/exec', {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: payload
        });
        console.log("Backend notification triggered:", title);
      } catch(e) { console.log("Backend notification error:", e); }
    }
    
    // Schedule duty reminders
    async function scheduleDutyReminders(duty) {
      const dutyDateTime = new Date(`${duty.date}T${duty.startTime}`);
      const now = new Date();
      
      // 24 hours before
      const twentyFourHour = new Date(dutyDateTime);
      twentyFourHour.setHours(twentyFourHour.getHours() - 24);
      if (twentyFourHour > now && notificationSettings && notificationSettings['24hour']) {
        const delayMs = twentyFourHour - now;
        setTimeout(async () => {
          await sendBackendNotification(
            '⏰ Upcoming Duty Tomorrow',
            `You have a ${duty.type} duty scheduled for tomorrow at ${duty.startTime}`,
            duty.date, duty.startTime, duty.type
          );
          if (typeof showNotification === 'function') {
            showNotification('Upcoming Duty Tomorrow', `You have a ${duty.type} duty scheduled for tomorrow at ${formatTime(duty.startTime)}`, 'warning');
          }
        }, delayMs);
      }
      
      // 1 hour before
      const oneHour = new Date(dutyDateTime);
      oneHour.setHours(oneHour.getHours() - 1);
      if (oneHour > now && notificationSettings && notificationSettings['1hour']) {
        const delayMs = oneHour - now;
        setTimeout(async () => {
          await sendBackendNotification(
            '⏰ Upcoming Duty in 1 Hour',
            `Your ${duty.type} duty starts at ${duty.startTime}`,
            duty.date, duty.startTime, duty.type
          );
          if (typeof showNotification === 'function') {
            showNotification('Upcoming Duty in 1 Hour', `Your ${duty.type} duty starts at ${formatTime(duty.startTime)}`, 'warning');
          }
        }, delayMs);
      }
      
      // 30 minutes before
      const thirtyMin = new Date(dutyDateTime);
      thirtyMin.setMinutes(thirtyMin.getMinutes() - 30);
      if (thirtyMin > now && notificationSettings && notificationSettings['30min']) {
        const delayMs = thirtyMin - now;
        setTimeout(async () => {
          await sendBackendNotification(
            '⏰ Upcoming Duty in 30 Minutes',
            `Your ${duty.type} duty starts soon at ${duty.startTime}`,
            duty.date, duty.startTime, duty.type
          );
          if (typeof showNotification === 'function') {
            showNotification('Upcoming Duty in 30 Minutes', `Your ${duty.type} duty starts soon at ${formatTime(duty.startTime)}`, 'warning');
          }
        }, delayMs);
      }
    }
    
    // Debug function
    window.checkOneSignalStatus = async function() {
      if (window.OneSignal) {
        try {
          const isPushSupported = await window.OneSignal.Notifications.isPushSupported();
          const permission = await window.OneSignal.Notifications.permission;
          const userId = await window.OneSignal.User.getOnesignalId();
          console.log("OneSignal Status:", { isPushSupported, permission, userId });
          if (userId) {
            showNotification("✅ Notifications Ready", "Push notifications are properly configured!", "success");
            await registerUserWithBackend(userId);
          }
        } catch(e) {
          console.log("OneSignal status error:", e);
        }
      }
    };
  </script>
  <!-- Add jsPDF library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
  <!-- Add Chart.js for analytics -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --primary: #3b82f6;
      --secondary: #10b981;
      --danger: #ef4444;
      --success: #22c55e;
      --warning: #f59e0b;
      --current-red: #dc2626;
      --bg-primary: #f8fafc;
      --bg-secondary: #ffffff;
      --bg-tertiary: #f1f5f9;
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --border-light: #e2e8f0;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      --overtime-color: #f97316;
      --holiday-color: #8b5cf6;
      --training-color: #06b6d4;
      --meeting-color: #ec4899;
      --emergency-color: #dc2626;
    }

    .dark {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-tertiary: #334155;
      --text-primary: #f8fafc;
      --text-secondary: #cbd5e1;
      --border-light: #334155;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      padding: 8px;
      transition: all 0.3s ease;
    }

    .container {
      max-width: 100%;
      margin: 0 auto;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      background: var(--bg-secondary);
      padding: 16px;
      border-radius: 12px;
      border: 1px solid var(--border-light);
      box-shadow: var(--shadow-sm);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      font-size: 24px;
    }

    .logo-text h1 {
      font-size: 20px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-text .subtitle {
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 500;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .theme-toggle {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border: 1px solid var(--border-light);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      display: none;
      align-items: center;
      gap: 6px;
    }

    .menu-toggle {
      background: var(--primary);
      color: white;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
    }

    .mobile-menu {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      display: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .mobile-menu.active {
      display: block;
      opacity: 1;
    }

    .mobile-menu-content {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-light);
      box-shadow: var(--shadow-lg);
      padding: 20px;
      transform: translateY(-100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      max-height: 90vh;
      overflow-y: auto;
    }

    .mobile-menu.active .mobile-menu-content {
      transform: translateY(0);
    }

    .mobile-menu-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--border-light);
    }

    .close-menu {
      background: none;
      border: none;
      font-size: 24px;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 8px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }

    .stat-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-light);
      border-radius: 10px;
      padding: 12px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
    }

    .stat-number {
      font-size: 18px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 2px;
    }

    .stat-label {
      font-size: 9px;
      color: var(--text-secondary);
      font-weight: 500;
      text-transform: uppercase;
    }

    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-light);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: var(--shadow-sm);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .card-icon {
      font-size: 20px;
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
    }

    .card-description {
      color: var(--text-secondary);
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-weight: 500;
      font-size: 14px;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border-light);
      border-radius: 8px;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      min-height: 44px;
      box-shadow: var(--shadow-sm);
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: #2563eb;
      transform: translateY(-1px);
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .btn-danger:hover {
      background: #dc2626;
      transform: translateY(-1px);
    }

    .btn-outline {
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border-light);
    }

    .btn-outline:hover {
      background: var(--bg-tertiary);
    }

    .desktop-actions {
      display: none;
      gap: 12px;
      margin-top: 16px;
    }

    .mobile-actions {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    .mobile-actions .btn {
      flex: 1;
    }

    .menu-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 20px;
    }

    .switch-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px;
      background: var(--bg-tertiary);
      border-radius: 8px;
      margin-bottom: 12px;
    }

    .switch-info {
      flex: 1;
    }

    .switch-title {
      font-weight: 500;
      font-size: 14px;
    }

    .switch-description {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .switch {
      position: relative;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .switch-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #ccc;
      transition: 0.3s;
      border-radius: 12px;
    }

    .switch-slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background: white;
      transition: 0.3s;
      border-radius: 50%;
    }

    input:checked + .switch-slider {
      background: var(--primary);
    }

    input:checked + .switch-slider:before {
      transform: translateX(20px);
    }

    .calendar-container {
      margin-top: 16px;
    }

    .calendar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .calendar-nav-btn {
      background: var(--bg-secondary);
      border: 1px solid var(--border-light);
      color: var(--text-primary);
      width: 40px;
      height: 40px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 18px;
    }

    .calendar-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--primary);
      text-align: center;
      flex: 1;
      margin: 0 12px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      background: var(--bg-secondary);
      border-radius: 12px;
      padding: 20px;
      border: 1px solid var(--border-light);
      min-height: 420px;
    }

    .calendar-day-name {
      font-weight: 600;
      font-size: 12px;
      text-align: center;
      padding: 12px 0;
      color: var(--text-secondary);
    }

    .calendar-date {
      background: var(--bg-primary);
      border: 1px solid var(--border-light);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      font-weight: 500;
      min-height: 55px;
      font-size: 14px;
      margin: 2px;
    }

    .calendar-date.today {
      border-color: #dc2626;
    }

    .calendar-date.today .date-number {
      background: #dc2626;
      color: white;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .calendar-date.regular {
      background: rgba(34, 197, 94, 0.1);
      border-color: #22c55e;
    }

    .calendar-date.overtime {
      background: rgba(249, 115, 22, 0.1);
      border-color: #f97316;
    }

    .calendar-date.holiday {
      background: rgba(139, 92, 246, 0.1);
      border-color: #8b5cf6;
    }

    .date-number {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
    }

    .duty-time {
      font-size: 10px;
      margin-top: 3px;
      padding: 2px 4px;
      border-radius: 3px;
    }

    .duty-popup-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 2000;
      display: none;
    }

    .duty-popup-overlay.active {
      display: block;
    }

    .duty-popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--bg-secondary);
      border-radius: 16px;
      padding: 20px;
      width: 90%;
      max-width: 500px;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
    }

    .duty-popup-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-light);
    }

    .close-duty-popup {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: var(--text-secondary);
    }

    .notification {
      position: fixed;
      top: 10px;
      left: 10px;
      right: 10px;
      background: var(--bg-secondary);
      border-radius: 12px;
      padding: 16px;
      box-shadow: var(--shadow-lg);
      z-index: 2000;
      transform: translateY(-100px);
      transition: transform 0.3s ease;
    }

    .notification.show {
      transform: translateY(0);
    }

    .notification.success {
      border-left: 4px solid #22c55e;
    }

    .notification.error {
      border-left: 4px solid #ef4444;
    }

    .notification.warning {
      border-left: 4px solid #f59e0b;
    }

    @media (min-width: 769px) {
      .container { max-width: 900px; margin: 0 auto; }
      .desktop-only { display: block; }
      .mobile-actions { display: none; }
      .desktop-actions { display: flex; }
      .stats-grid { grid-template-columns: repeat(4, 1fr); }
      .theme-toggle { display: flex; }
      .calendar-grid { gap: 8px; padding: 24px; }
      .calendar-date { min-height: 65px; }
    }

    @media (max-width: 480px) {
      .stats-grid { grid-template-columns: 1fr; }
      .calendar-date { min-height: 50px; }
      .calendar-grid { gap: 4px; padding: 12px; }
      .duty-time { font-size: 8px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo">
        <div class="logo-icon">📅</div>
        <div class="logo-text">
          <h1>Duty Calendar</h1>
          <div class="subtitle">Professional Scheduling</div>
        </div>
      </div>
      <div class="header-actions">
        <button class="theme-toggle" onclick="toggleTheme()">🌙 Dark</button>
        <button class="menu-toggle" onclick="toggleMobileMenu()">⚙️</button>
      </div>
    </header>

    <div class="mobile-menu" id="mobileMenu" onclick="closeMobileMenuOnBackdrop(event)">
      <div class="mobile-menu-content">
        <div class="mobile-menu-header">
          <div class="mobile-menu-title">Menu</div>
          <button class="close-menu" onclick="toggleMobileMenu()">×</button>
        </div>
        <div class="menu-actions">
          <button class="btn btn-outline" onclick="showAnalytics(); toggleMobileMenu();">📊 View Analytics</button>
          <button class="btn btn-outline" onclick="exportToPDF(); toggleMobileMenu();">📄 Export PDF</button>
          <button class="btn btn-outline" onclick="toggleTheme();">🌙 Toggle Theme</button>
        </div>
      </div>
    </div>

    <main>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-number" id="totalDuties">0</div><div class="stat-label">Total Duties</div></div>
        <div class="stat-card"><div class="stat-number" id="monthDuties">0</div><div class="stat-label">This Month</div></div>
        <div class="stat-card"><div class="stat-number" id="nextDuty">--</div><div class="stat-label">Next Duty</div></div>
        <div class="stat-card"><div class="stat-number" id="avgHours">0</div><div class="stat-label">Avg Hours</div></div>
      </div>

      <div class="card desktop-only">
        <div class="card-header">
          <div class="card-icon">📋</div>
          <div><div class="card-title">Duty Management</div><div class="card-description">Schedule your duty assignments</div></div>
        </div>
        <div class="form-group"><label>📅 Date</label><input type="date" id="dutyDate"></div>
        <div class="form-row">
          <div class="form-group"><label>🕐 Start</label><input type="time" id="startTime" value="08:00"></div>
          <div class="form-group"><label>🕔 End</label><input type="time" id="endTime" value="17:00"></div>
        </div>
        <div class="form-group">
          <label>🏷️ Type</label>
          <select id="dutyType">
            <option value="regular">Regular</option><option value="overtime">Overtime</option>
            <option value="holiday">Holiday</option><option value="training">Training</option>
            <option value="meeting">Meeting</option><option value="emergency">Emergency</option>
          </select>
        </div>
        <div class="form-group"><label>📝 Notes</label><textarea id="dutyNotes" rows="2"></textarea></div>
        <div class="desktop-actions">
          <button class="btn btn-primary" onclick="addDuty()">➕ Add Duty</button>
          <button class="btn btn-danger" onclick="removeDuty()">🗑️ Remove</button>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-icon">📆</div>
          <div><div class="card-title">Duty Calendar</div><div class="card-description">Visual overview of duties</div></div>
        </div>
        <div class="calendar-container">
          <div class="calendar-header">
            <button class="calendar-nav-btn" onclick="changeMonth(-1)">‹</button>
            <div class="calendar-title" id="calendarTitle">December 2024</div>
            <button class="calendar-nav-btn" onclick="changeMonth(1)">›</button>
          </div>
          <div class="calendar-grid" id="calendarGrid"></div>
        </div>
      </div>
    </main>
  </div>

  <div class="duty-popup-overlay" id="dutyPopup" onclick="closeDutyPopupOnBackdrop(event)">
    <div class="duty-popup">
      <div class="duty-popup-header"><div class="duty-popup-title">Duty for <span id="dutyPopupDate"></span></div><button class="close-duty-popup" onclick="hideDutyPopup()">×</button></div>
      <div id="existingDutyInfo"></div>
      <div class="form-group"><label>🕐 Start</label><input type="time" id="popupStartTime"></div>
      <div class="form-group"><label>🕔 End</label><input type="time" id="popupEndTime"></div>
      <div class="form-group"><label>🏷️ Type</label><select id="popupDutyType"><option value="regular">Regular</option><option value="overtime">Overtime</option><option value="holiday">Holiday</option><option value="training">Training</option><option value="meeting">Meeting</option><option value="emergency">Emergency</option></select></div>
      <div style="display: flex; gap: 12px; margin-top: 16px;">
        <button class="btn btn-primary" onclick="saveDutyFromPopup()">💾 Save</button>
        <button class="btn btn-danger" onclick="deleteDutyFromPopup()" id="popupDeleteBtn" style="display:none">🗑️ Delete</button>
        <button class="btn btn-outline" onclick="hideDutyPopup()">Close</button>
      </div>
    </div>
  </div>

  <div class="notification" id="notification">
    <div style="display: flex; justify-content: space-between;">
      <div><h4 id="notificationTitle"></h4><p id="notificationMessage"></p></div>
      <button onclick="hideNotification()" style="background:none; border:none; font-size:20px; cursor:pointer;">×</button>
    </div>
  </div>

  <script>
    // Global variables
    let duties = JSON.parse(localStorage.getItem('duties')) || [];
    let notes = JSON.parse(localStorage.getItem('dutyNotes')) || [];
    let currentMonth = new Date();
    let selectedDate = getCurrentDate();
    let notificationSettings = JSON.parse(localStorage.getItem('notificationSettings')) || {
      enabled: true, '24hour': true, '1hour': true, '30min': true
    };
    let notificationTimeouts = {};

    function getCurrentDate() { return new Date().toISOString().split('T')[0]; }
    function formatDate(dateStr) { return new Date(dateStr).toLocaleDateString(); }
    function formatTime(timeStr) { return timeStr; }
    function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2); }

    function saveDuties() { localStorage.setItem('duties', JSON.stringify(duties)); updateStats(); scheduleAllNotifications(); }
    
    function updateStats() {
      const currentDate = new Date();
      const currentMonthDuties = duties.filter(duty => new Date(duty.date).getMonth() === currentDate.getMonth());
      const futureDuties = duties.filter(duty => new Date(duty.date) > currentDate);
      const nextDuty = futureDuties.length > 0 ? formatDate(futureDuties.sort((a,b)=>new Date(a.date)-new Date(b.date))[0].date) : '--';
      const totalHours = duties.reduce((sum, duty) => sum + 8, 0);
      document.getElementById('totalDuties').textContent = duties.length;
      document.getElementById('monthDuties').textContent = currentMonthDuties.length;
      document.getElementById('nextDuty').textContent = nextDuty;
      document.getElementById('avgHours').textContent = duties.length ? Math.round(totalHours/duties.length) : 0;
    }

    async function showNotification(title, message, type) {
      const notif = document.getElementById('notification');
      document.getElementById('notificationTitle').textContent = title;
      document.getElementById('notificationMessage').textContent = message;
      notif.className = `notification ${type} show`;
      if (notificationSettings.enabled && 'Notification' in window && Notification.permission === 'granted') {
        new Notification(title, { body: message });
      }
      setTimeout(() => notif.classList.remove('show'), 5000);
    }

    function hideNotification() { document.getElementById('notification').classList.remove('show'); }

    function scheduleAllNotifications() {
      Object.keys(notificationTimeouts).forEach(k => clearTimeout(notificationTimeouts[k]));
      notificationTimeouts = {};
      const now = new Date();
      duties.forEach(duty => {
        const dutyDateTime = new Date(`${duty.date}T${duty.startTime}`);
        if (dutyDateTime > now && notificationSettings['1hour']) {
          const oneHourBefore = new Date(dutyDateTime);
          oneHourBefore.setHours(oneHourBefore.getHours() - 1);
          if (oneHourBefore > now) {
            notificationTimeouts[duty.id] = setTimeout(() => {
              showNotification('Upcoming Duty', `Your ${duty.type} duty starts at ${duty.startTime}`, 'warning');
              sendBackendNotification('Upcoming Duty', `Your ${duty.type} duty starts at ${duty.startTime}`, duty.date, duty.startTime, duty.type);
            }, oneHourBefore - now);
          }
        }
      });
    }

    function addDuty() {
      const date = document.getElementById('dutyDate').value;
      const startTime = document.getElementById('startTime').value;
      const endTime = document.getElementById('endTime').value;
      const type = document.getElementById('dutyType').value;
      if (!date || !startTime) { showNotification('Error', 'Please fill all fields', 'error'); return; }
      if (duties.find(d => d.date === date)) { showNotification('Error', 'Duty already exists', 'error'); return; }
      const newDuty = { id: generateId(), date, startTime, endTime, type, notes: '', createdAt: new Date().toISOString() };
      duties.push(newDuty);
      saveDuties();
      renderCalendar();
      document.getElementById('dutyDate').value = getCurrentDate();
      showNotification('Success', 'Duty added! Reminders scheduled.', 'success');
      scheduleDutyReminders(newDuty);
    }

    function removeDuty() {
      const date = document.getElementById('dutyDate').value;
      const index = duties.findIndex(d => d.date === date);
      if (index === -1) { showNotification('Error', 'No duty found', 'error'); return; }
      duties.splice(index, 1);
      saveDuties();
      renderCalendar();
      showNotification('Success', 'Duty removed', 'success');
    }

    function changeMonth(direction) { currentMonth.setMonth(currentMonth.getMonth() + direction); renderCalendar(); }
    
    function renderCalendar() {
      const calendar = document.getElementById('calendarGrid');
      const title = document.getElementById('calendarTitle');
      const year = currentMonth.getFullYear();
      const month = currentMonth.getMonth();
      const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
      title.textContent = `${monthNames[month]} ${year}`;
      calendar.innerHTML = '';
      const dayNames = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
      dayNames.forEach(day => { const el = document.createElement('div'); el.className = 'calendar-day-name'; el.textContent = day; calendar.appendChild(el); });
      const firstDay = new Date(year, month, 1).getDay();
      const mondayFirstDay = firstDay === 0 ? 6 : firstDay - 1;
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      for (let i = 0; i < mondayFirstDay; i++) { const empty = document.createElement('div'); empty.className = 'calendar-date other-month'; calendar.appendChild(empty); }
      const today = getCurrentDate();
      for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        const duty = duties.find(d => d.date === dateStr);
        const dateEl = document.createElement('div');
        let classes = 'calendar-date';
        if (dateStr === today) classes += ' today';
        if (duty) classes += ' duty ' + duty.type;
        dateEl.className = classes;
        dateEl.onclick = () => showDutyPopup(dateStr);
        const dateNum = document.createElement('div');
        dateNum.className = 'date-number';
        dateNum.textContent = day;
        dateEl.appendChild(dateNum);
        if (duty) { const timeEl = document.createElement('div'); timeEl.className = 'duty-time'; timeEl.textContent = duty.startTime; dateEl.appendChild(timeEl); }
        calendar.appendChild(dateEl);
      }
    }

    function showDutyPopup(dateStr) {
      selectedDate = dateStr;
      const duty = duties.find(d => d.date === dateStr);
      document.getElementById('dutyPopupDate').textContent = formatDate(dateStr);
      document.getElementById('popupStartTime').value = duty ? duty.startTime : '08:00';
      document.getElementById('popupEndTime').value = duty ? duty.endTime : '17:00';
      document.getElementById('popupDutyType').value = duty ? duty.type : 'regular';
      document.getElementById('popupDeleteBtn').style.display = duty ? 'block' : 'none';
      document.getElementById('dutyPopup').classList.add('active');
    }

    function hideDutyPopup() { document.getElementById('dutyPopup').classList.remove('active'); }
    function closeDutyPopupOnBackdrop(event) { if (event.target === event.currentTarget) hideDutyPopup(); }
    
    function saveDutyFromPopup() {
      const index = duties.findIndex(d => d.date === selectedDate);
      const startTime = document.getElementById('popupStartTime').value;
      const endTime = document.getElementById('popupEndTime').value;
      const type = document.getElementById('popupDutyType').value;
      if (index !== -1) {
        duties[index] = { ...duties[index], startTime, endTime, type };
      } else {
        duties.push({ id: generateId(), date: selectedDate, startTime, endTime, type, notes: '', createdAt: new Date().toISOString() });
      }
      saveDuties();
      renderCalendar();
      hideDutyPopup();
      showNotification('Success', 'Duty saved', 'success');
    }
    
    function deleteDutyFromPopup() {
      const index = duties.findIndex(d => d.date === selectedDate);
      if (index !== -1) duties.splice(index, 1);
      saveDuties();
      renderCalendar();
      hideDutyPopup();
      showNotification('Success', 'Duty deleted', 'success');
    }

    function showAnalytics() { showNotification('Analytics', `Total Duties: ${duties.length}`, 'info'); }
    function exportToPDF() { showNotification('Export', 'PDF export ready', 'success'); }
    function toggleTheme() { document.body.classList.toggle('dark'); localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light'); }
    function toggleMobileMenu() { document.getElementById('mobileMenu').classList.toggle('active'); }
    function closeMobileMenuOnBackdrop(event) { if (event.target === event.currentTarget) toggleMobileMenu(); }
    function testNotification() { showNotification('Test', 'Notifications work!', 'success'); sendBackendNotification('Test', 'Your notification system works!', '', '', 'test'); }

    function initializeApp() {
      selectedDate = getCurrentDate();
      document.getElementById('dutyDate').value = selectedDate;
      if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
      renderCalendar();
      updateStats();
      if (notificationSettings.enabled && 'Notification' in window && Notification.permission !== 'granted') {
        Notification.requestPermission();
      }
      setTimeout(() => { if (window.checkOneSignalStatus) window.checkOneSignalStatus(); }, 5000);
    }

    document.addEventListener('DOMContentLoaded', initializeApp);
  </script>
</body>
</html>
